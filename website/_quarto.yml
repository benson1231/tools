project:
  type: website
  render:
    - "**/*.qmd"
    - "!**/*.Rmd"
execute: 
  enabled: false  
number-sections: true
lightbox: true
date-format: "YYYY-MM-DD"

format:
  html:
    css: styles/styles.css
    theme: 
      light: flatly
      dark: darkly
    respect-user-color-scheme: true
    toc: true
    toc-title: Contents
    toc-location: left
    toc-depth: 4
    toc-expand: 1
    other-links:
      - text: Home
        icon: house
        href: https://benson1231.github.io/tools/
    code-links:
      - text: GitHub Repo
        icon: github
        href: https://github.com/benson1231/tools

website:
  site-url: "https://benson1231.github.io/tools/"
  favicon: assets/logo.svg
  back-to-top-navigation: true
  page-footer: "Copyright 2026, benson1231"
